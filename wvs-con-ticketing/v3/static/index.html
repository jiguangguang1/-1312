<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎫 NOL 抢票系统 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--dim:#888;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
header h1{font-size:1.5rem;display:flex;align-items:center;gap:10px}
header h1 span{font-size:1.8rem}
.status-badge{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:600;text-transform:uppercase}
.status-idle{background:#222;color:var(--dim)}
.status-grabbing{background:#1a1a3e;color:var(--accent);animation:pulse 1.5s infinite}
.status-success{background:#0a2a0a;color:var(--green)}
.status-failed{background:#2a0a0a;color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{font-size:.85rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.card .value{font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums}
.card .sub{font-size:.8rem;color:var(--dim);margin-top:4px}

.big-number{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.log-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;max-height:400px;overflow-y:auto;font-family:'SF Mono',Consolas,monospace;font-size:.8rem;line-height:1.6}
.log-panel .log-line{padding:2px 0;border-bottom:1px solid #1a1a2a}
.log-panel .log-info{color:var(--blue)}
.log-panel .log-warn{color:var(--yellow)}
.log-panel .log-error{color:var(--red)}
.log-panel .log-success{color:var(--green)}
.log-panel .time{color:var(--dim);margin-right:8px}

.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.8rem;color:var(--dim);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem}
.form-group input:focus{border-color:var(--accent);outline:none}

.accounts-list{display:flex;flex-direction:column;gap:8px}
.account-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.account-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.account-dot.ok{background:var(--green)}
.account-dot.err{background:var(--red)}
.account-dot.unknown{background:var(--dim)}

.countdown{font-size:1.2rem;color:var(--accent);margin:12px 0;font-variant-numeric:tabular-nums}

.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85rem;color:var(--dim);background:transparent;border:none}
.tab.active{background:var(--card);color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

@media(max-width:768px){.grid{grid-template-columns:1fr}.container{padding:12px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>🎫</span> NOL 抢票系统 <small style="color:var(--dim);font-size:.6em">v3</small></h1>
    <div id="statusBadge" class="status-badge status-idle">IDLE</div>
  </header>

  <!-- 倒计时 -->
  <div class="card" style="margin-bottom:16px">
    <h3>⏰ 开售倒计时</h3>
    <div id="countdown" class="countdown">--</div>
    <div id="saleInfo" class="sub">--</div>
  </div>

  <!-- 统计 -->
  <div class="grid">
    <div class="card">
      <h3>总尝试次数</h3>
      <div id="totalAttempts" class="big-number">0</div>
      <div class="sub" id="attemptsPerSec">-- 次/秒</div>
    </div>
    <div class="card">
      <h3>平均延迟</h3>
      <div id="avgLatency" class="value">--</div>
      <div class="sub" id="latencyRange">--</div>
    </div>
    <div class="card">
      <h3>状态</h3>
      <div id="grabStatus" class="value">空闲</div>
      <div class="sub" id="elapsedTime">--</div>
    </div>
    <div class="card">
      <h3>账号</h3>
      <div id="accountCount" class="value">0</div>
      <div class="sub">已加载</div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn-primary" id="btnGrab" onclick="startGrab()">🚀 开始抢票</button>
    <button class="btn btn-danger" id="btnStop" onclick="stopGrab()" disabled>⏹ 停止</button>
    <button class="btn btn-secondary" onclick="checkAccounts()">🔍 检查账号</button>
    <button class="btn btn-secondary" onclick="getSales()">📊 售卖信息</button>
    <button class="btn btn-secondary" onclick="toggleConfig()">⚙️ 配置</button>
  </div>

  <!-- 配置面板 -->
  <div id="configPanel" style="display:none">
    <div class="config-grid">
      <div class="card">
        <h3>演出设置</h3>
        <div class="form-group"><label>商品代码</label><input id="cfg_goods" /></div>
        <div class="form-group"><label>场馆代码</label><input id="cfg_place" /></div>
        <div class="form-group"><label>一般开售 (KST)</label><input id="cfg_sale" placeholder="2026-04-30 20:00:00" /></div>
        <div class="form-group"><label>预售时间 (可选)</label><input id="cfg_presale" placeholder="2026-04-29 20:00:00" /></div>
      </div>
      <div class="card">
        <h3>抢票策略</h3>
        <div class="form-group"><label>最大重试</label><input id="cfg_retries" type="number" /></div>
        <div class="form-group"><label>重试间隔(秒)</label><input id="cfg_delay" type="number" step="0.01" /></div>
        <div class="form-group"><label>提前冲刺(秒)</label><input id="cfg_pre" type="number" /></div>
        <div class="form-group"><label>购买数量</label><input id="cfg_count" type="number" /></div>
      </div>
      <div class="card">
        <h3>通知</h3>
        <div class="form-group"><label>钉钉 Webhook</label><input id="cfg_ding" /></div>
        <div class="form-group"><label>企微 Webhook</label><input id="cfg_wx" /></div>
        <div class="form-group"><label>Telegram Token</label><input id="cfg_tg_token" /></div>
        <div class="form-group"><label>Telegram Chat ID</label><input id="cfg_tg_chat" /></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
    </div>
  </div>

  <!-- 账号列表 -->
  <div class="card" style="margin-bottom:16px">
    <h3>👥 账号列表</h3>
    <div id="accountsList" class="accounts-list">
      <div class="account-item"><span class="account-dot unknown"></span>加载中...</div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="card">
    <h3>📋 实时日志</h3>
    <div id="logPanel" class="log-panel"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();
let startTime = null;
let grabInterval = null;

// ── WebSocket ──
socket.on('connect', () => addLog('WebSocket 已连接', 'success'));

socket.on('status', data => updateStatus(data));
socket.on('progress', data => {
  document.getElementById('totalAttempts').textContent = data.attempt;
  document.getElementById('avgLatency').textContent = Math.round(data.avg_ms) + 'ms';
  document.getElementById('elapsedTime').textContent = Math.round(data.elapsed) + 's';
});
socket.on('log', data => addLog(data.msg, data.level));
socket.on('success', data => {
  addLog(`🎉🎉🎉 成功! ${data.date} 档位#${data.grade} ${data.attempts}次/${data.elapsed.toFixed(1)}s`, 'success');
  document.getElementById('statusBadge').className = 'status-badge status-success';
  document.getElementById('statusBadge').textContent = 'SUCCESS';
  document.getElementById('btnGrab').disabled = false;
  document.getElementById('btnStop').disabled = true;
});
socket.on('failed', data => {
  addLog(`😢 失败 ${data.attempts}次/${data.elapsed.toFixed(1)}s`, 'error');
  document.getElementById('statusBadge').className = 'status-badge status-failed';
  document.getElementById('btnGrab').disabled = false;
  document.getElementById('btnStop').disabled = true;
});
socket.on('done', () => {
  document.getElementById('btnGrab').disabled = false;
  document.getElementById('btnStop').disabled = true;
  if (grabInterval) { clearInterval(grabInterval); grabInterval = null; }
});

// ── 更新状态 ──
function updateStatus(data) {
  const s = data.status || 'idle';
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge status-' + s;
  badge.textContent = s.toUpperCase();

  document.getElementById('accountCount').textContent = data.accounts || 0;

  if (data.stats) {
    document.getElementById('totalAttempts').textContent = data.stats.total_attempts;
    document.getElementById('avgLatency').textContent = Math.round(data.stats.avg_latency_ms) + 'ms';
    const min = Math.round(data.stats.min_latency_ms);
    const max = Math.round(data.stats.max_latency_ms);
    document.getElementById('latencyRange').textContent = `${min}ms ~ ${max}ms`;
  }

  if (s === 'grabbing') {
    document.getElementById('btnGrab').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('grabStatus').textContent = '抢票中';
    if (!startTime) startTime = Date.now();
  } else if (s === 'success') {
    document.getElementById('grabStatus').textContent = '✅ 成功';
  } else if (s === 'failed') {
    document.getElementById('grabStatus').textContent = '❌ 失败';
  } else {
    document.getElementById('grabStatus').textContent = '空闲';
    document.getElementById('btnGrab').disabled = false;
    document.getElementById('btnStop').disabled = true;
  }
}

// ── 倒计时 ──
function updateCountdown() {
  fetch('/api/config').then(r=>r.json()).then(cfg => {
    const saleTime = cfg.presale_time || cfg.sale_time;
    if (!saleTime) return;
    const target = new Date(saleTime + '+09:00');
    const now = new Date();
    const diff = (target - now) / 1000;

    const el = document.getElementById('countdown');
    const info = document.getElementById('saleInfo');

    if (diff <= 0) {
      el.textContent = '🔥 已开售!';
      el.style.color = 'var(--green)';
    } else {
      const d = Math.floor(diff / 86400);
      const h = Math.floor((diff % 86400) / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = Math.floor(diff % 60);
      el.textContent = `${d}天 ${h}时 ${m}分 ${s}秒`;
      el.style.color = diff < 300 ? 'var(--red)' : 'var(--accent)';
    }

    info.textContent = `${cfg.presale_time ? '粉丝预售' : '一般开售'}: ${saleTime} KST | 演出: ${(cfg.play_dates||[]).join(' ~ ')}`;
  });
}
setInterval(updateCountdown, 1000);
updateCountdown();

// ── 日志 ──
function addLog(msg, level='info') {
  const panel = document.getElementById('logPanel');
  const now = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  line.className = 'log-line log-' + (level || 'info');
  line.innerHTML = `<span class="time">${now}</span>${msg}`;
  panel.appendChild(line);
  panel.scrollTop = panel.scrollHeight;
  if (panel.children.length > 500) panel.removeChild(panel.firstChild);
}

// ── 操作 ──
function startGrab() {
  addLog('🚀 启动抢票...');
  document.getElementById('btnGrab').disabled = true;
  document.getElementById('btnStop').disabled = false;
  startTime = Date.now();
  grabInterval = setInterval(() => {
    document.getElementById('elapsedTime').textContent = Math.round((Date.now()-startTime)/1000) + 's';
  }, 1000);
  fetch('/api/grab', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
}

function stopGrab() {
  fetch('/api/stop', {method:'POST'});
  addLog('⏹ 已发送停止信号', 'warn');
  document.getElementById('btnGrab').disabled = false;
  document.getElementById('btnStop').disabled = true;
  if (grabInterval) { clearInterval(grabInterval); grabInterval = null; }
}

function checkAccounts() {
  addLog('🔍 检查账号...');
  fetch('/api/check').then(r=>r.json()).then(data => {
    const list = document.getElementById('accountsList');
    list.innerHTML = '';
    data.accounts.forEach(a => {
      const item = document.createElement('div');
      item.className = 'account-item';
      const dotClass = a.status === 'ok' ? 'ok' : 'err';
      item.innerHTML = `<span class="account-dot ${dotClass}"></span>
        <strong>${a.label}</strong>
        <span style="color:var(--dim)">${a.name || ''} ${a.email || ''}</span>
        ${a.error ? `<span style="color:var(--red);font-size:.8rem">${a.error}</span>` : ''}`;
      list.appendChild(item);
      addLog(`${a.label}: ${a.status === 'ok' ? '✅' : '❌'} ${a.name || a.error || ''}`);
    });
  });
}

function getSales() {
  addLog('📊 获取售卖信息...');
  fetch('/api/sales').then(r=>r.json()).then(data => {
    if (data.error) { addLog('❌ ' + data.error, 'error'); return; }
    const si = data.salesInfo;
    addLog(`📅 ${si.playStartDate} ~ ${si.playEndDate}`);
    addLog(`🕐 一般开售: ${si.bookingOpenTime} KST`);
    addLog(`📋 状态: ${si.goodsStatus === 'Y' ? '可售' : '不可售'}`);
    (data.preSalesInfo || []).forEach(ps => {
      addLog(`🎫 预售: ${ps.preBookingKindName} ${ps.bookingOpenTime} ~ ${ps.bookingEndTime}`);
    });
  });
}

function toggleConfig() {
  const panel = document.getElementById('configPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    loadConfig();
  } else {
    panel.style.display = 'none';
  }
}

function loadConfig() {
  fetch('/api/config').then(r=>r.json()).then(cfg => {
    document.getElementById('cfg_goods').value = cfg.goods_code || '';
    document.getElementById('cfg_place').value = cfg.place_code || '';
    document.getElementById('cfg_sale').value = cfg.sale_time || '';
    document.getElementById('cfg_presale').value = cfg.presale_time || '';
    document.getElementById('cfg_retries').value = cfg.max_retries || 200;
    document.getElementById('cfg_delay').value = cfg.retry_delay || 0.03;
    document.getElementById('cfg_pre').value = cfg.pre_seconds || 2;
    document.getElementById('cfg_count').value = cfg.ticket_count || 1;
    const n = cfg.notifications || {};
    document.getElementById('cfg_ding').value = n.ding_webhook || '';
    document.getElementById('cfg_wx').value = n.wx_webhook || '';
    document.getElementById('cfg_tg_token').value = n.telegram_bot_token || '';
    document.getElementById('cfg_tg_chat').value = n.telegram_chat_id || '';
  });
}

function saveConfig() {
  const cfg = {
    goods_code: document.getElementById('cfg_goods').value,
    place_code: document.getElementById('cfg_place').value,
    sale_time: document.getElementById('cfg_sale').value,
    presale_time: document.getElementById('cfg_presale').value,
    max_retries: parseInt(document.getElementById('cfg_retries').value) || 200,
    retry_delay: parseFloat(document.getElementById('cfg_delay').value) || 0.03,
    pre_seconds: parseInt(document.getElementById('cfg_pre').value) || 2,
    ticket_count: parseInt(document.getElementById('cfg_count').value) || 1,
    notifications: {
      ding_webhook: document.getElementById('cfg_ding').value,
      wx_webhook: document.getElementById('cfg_wx').value,
      telegram_bot_token: document.getElementById('cfg_tg_token').value,
      telegram_chat_id: document.getElementById('cfg_tg_chat').value,
    }
  };
  fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)})
    .then(r=>r.json()).then(() => addLog('✅ 配置已保存', 'success'));
}

// 初始化
addLog('🎫 NOL 抢票系统 v3 已加载');
checkAccounts();
</script>
</body>
</html>
