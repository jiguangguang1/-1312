version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
    volumes:
      - db-data:/app/backend
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
    restart: unless-stopped

volumes:
  db-data:
